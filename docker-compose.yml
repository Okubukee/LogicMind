version: '3.8'

services:
  # Servicio del backend (Flask)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: logicmind-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
       - ./backend:/app
    networks:
      - logicmind-network
    restart: unless-stopped

  # Servicio del frontend (React + nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: logicmind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - logicmind-network
    restart: unless-stopped

# Red para comunicación entre servicios
networks:
  logicmind-network:
    driver: bridge